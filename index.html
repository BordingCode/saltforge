<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
<meta name="theme-color" content="#0c1418" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<title>Saltforge</title>
<link rel="manifest" href="manifest.json" />
<link rel="icon" href="icon.svg" type="image/svg+xml" />
<link rel="apple-touch-icon" href="icon.svg" />
<link rel="stylesheet" href="css/app.css?v=1" />
</head>
<body>
  <div id="app">
    <!-- The canvas world (overworld map). DOM UI layers mount above it. -->
    <canvas id="world" aria-label="The frontier"></canvas>
    <!-- HUD + screen overlays are injected here by the UI layer. -->
    <div id="hud"></div>
    <div id="overlay"></div>
    <div id="toast-wrap" aria-live="polite"></div>
  </div>
  <div id="splash">
    <div class="splash-mark">SALTFORGE</div>
    <div class="splash-sub">forging the frontier…</div>
  </div>
  <script type="module" src="js/main.js?v=1"></script>
</body>
</html>
